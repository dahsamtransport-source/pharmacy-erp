الاسم : " CodeQL Advanced "

على :
  يدفع :
    الفروع : [ "الرئيسي" ]
  طلب سحب :
    الفروع : [ "الرئيسي" ]
  جدول :
    - cron : ' 20 16 * * 3 '

الوظائف :
  تحليل :
    الاسم : تحليل (${{ matrix.language }})
    يؤثر حجم المُشغِّل على وقت تحليل CodeQL. لمعرفة المزيد، يُرجى الاطلاع على:
    #    - https://gh.io/recommended-hardware-resources-for-running-codeql
    #    - https://gh.io/supported-runners-and-hardware-resources
    #    - https://gh.io/using-larger-runners (متوفر فقط على GitHub.com)
    # ضع في اعتبارك استخدام أجهزة تشغيل أكبر أو آلات ذات موارد أكبر لتحسين وقت التحليل المحتمل.
    يعمل على : ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    الأذونات :
      # مطلوب لجميع سير العمل
      أحداث الأمان : كتابة

      # مطلوب لجلب حزم CodeQL الداخلية أو الخاصة
      الحزم : قراءة

      # مطلوب فقط لسير العمل في المستودعات الخاصة
      الإجراءات : قراءة
      المحتويات : اقرأ

    الاستراتيجية :
      فشل سريع : خطأ
      المصفوفة :
        يشمل :
        # يدعم CodeQL الكلمات المفتاحية التالية للقيم الخاصة بـ 'language': 'actions', 'c-cpp', 'csharp', 'go', 'java-kotlin', 'javascript-typescript', 'python', 'ruby', 'rust', 'swift'
        # استخدم `c-cpp` لتحليل التعليمات البرمجية المكتوبة بلغة C أو C++ أو كليهما
        # استخدم 'java-kotlin' لتحليل التعليمات البرمجية المكتوبة بلغة Java أو Kotlin أو كليهما
        # استخدم 'javascript-typescript' لتحليل التعليمات البرمجية المكتوبة بلغة JavaScript أو TypeScript أو كليهما
        # لمعرفة المزيد حول تغيير اللغات التي يتم تحليلها أو تخصيص وضع الإنشاء لتحليلك،
        # انظر https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning/customizing-your-advanced-setup-for-code-scanning.
        # إذا كنت تقوم بتحليل لغة مُصرّفة، يمكنك تعديل "وضع البناء" لتلك اللغة لتخصيص كيفية
        # يتم تحليل قاعدة التعليمات البرمجية الخاصة بك، راجع https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning/codeql-code-scanning-for-compiled-languages
    ريس :
    - الاسم : مستودع التحقق
      يستخدم : actions/checkout@v4

    # أضف أي خطوات إعداد قبل تشغيل الإجراء `github/codeql-action/init`.
    # يتضمن ذلك خطوات مثل تثبيت المترجمات أو بيئات التشغيل (`actions/setup-node`
    ( أو غيرها). هذا مطلوب عادةً فقط لعمليات البناء اليدوية.
    # - الاسم: إعداد وقت التشغيل (مثال)
    #    الاستخدامات: actions/setup-example@v1

    # يقوم بتهيئة أدوات CodeQL للمسح الضوئي.
    - الاسم : تهيئة CodeQL
      يستخدم : github/codeql-action/init@v4
      مع :
        اللغات : ${{ matrix.language }}
        وضع البناء : ${{ matrix.build-mode }}
        # إذا كنت ترغب في تحديد استعلامات مخصصة، يمكنك القيام بذلك هنا أو في ملف التكوين.
        # بشكل افتراضي، ستتجاوز الاستعلامات المدرجة هنا أي استعلامات محددة في ملف التكوين.
        # ضع علامة "+" في بداية القائمة هنا لاستخدام هذه الاستعلامات والاستعلامات الموجودة في ملف التكوين.

        # لمزيد من التفاصيل حول حزم استعلام CodeQL، راجع الرابط التالي: https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/configuring-code-scanning#using-queries-in-ql-packs
        الاستعلامات : الأمان الموسع، الأمان والجودة

    # إذا فشلت خطوة التحليل لإحدى اللغات التي تقوم بتحليلها
    # "لم نتمكن من إنشاء التعليمات البرمجية الخاصة بك تلقائيًا"، عدّل المصفوفة أعلاه
    # لضبط وضع البناء على "يدوي" لتلك اللغة. ثم عدّل هذه الخطوة
    # لبناء الكود الخاص بك.
    # ℹ️ برامج سطر الأوامر التي يتم تشغيلها باستخدام واجهة سطر الأوامر لنظام التشغيل.
    # 📚 انظر https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#jobsjob_idstepsrun
    - الاسم : تشغيل خطوات البناء اليدوية
      إذا كان : matrix.build-mode == 'manual'
      shell : bash
      تشغيل : |
        echo 'إذا كنت تستخدم وضع البناء "اليدوي" لواحد أو أكثر من' \
          'اللغات التي تقوم بتحليلها، استبدل هذا بالأوامر اللازمة للبناء'
          مثال على الكود الخاص بك:
        echo ' make bootstrap'
        echo 'make release'
        المخرج 1
    - الاسم : إجراء تحليل CodeQL
      يستخدم : github/codeql-action/analyze@v4
      مع :
        الفئة : " /language:${{matrix.language}} "
